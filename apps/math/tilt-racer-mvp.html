<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>傾きレース MVP</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: white;
      overflow: hidden;
      touch-action: none;
    }
    #wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.35);
      z-index: 2;
    }
    .title {
      font-weight: 700;
      font-size: 15px;
      line-height: 1.2;
    }
    .small {
      font-size: 12px;
      opacity: 0.85;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 700;
      background: white;
      color: #111827;
    }
    #game {
      width: min(100vw, 460px);
      height: calc(100vh - 72px);
      max-height: 820px;
      background: #0b1220;
      border-left: 3px solid rgba(255,255,255,0.3);
      border-right: 3px solid rgba(255,255,255,0.3);
      display: block;
    }
    #hud {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 72px;
      width: min(100vw, 460px);
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      font-weight: 700;
      text-shadow: 0 1px 3px #000;
    }
    #debug {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 12px;
      width: min(96vw, 430px);
      background: rgba(0,0,0,0.5);
      border-radius: 14px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.5;
    }
    .bar {
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 4px;
    }
    #barFill {
      height: 100%;
      width: 50%;
      background: white;
      border-radius: 999px;
    }
    #overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,0.62);
      z-index: 3;
      padding: 22px;
      text-align: center;
    }
    #panel {
      width: min(92vw, 420px);
      background: #111827;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    #panel h1 {
      margin: 0 0 8px;
      font-size: 23px;
    }
    #panel p {
      margin: 8px 0;
      line-height: 1.65;
      color: rgba(255,255,255,0.9);
    }
    #panel button {
      margin-top: 12px;
      width: 100%;
      font-size: 16px;
      padding: 13px 16px;
    }
    .kbd {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.25);
      border-bottom-width: 3px;
      padding: 1px 6px;
      border-radius: 6px;
      font-size: 12px;
      background: rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div id="wrap">
    <header>
      <div>
        <div class="title">傾きレース MVP</div>
        <div class="small">スマホを左右に傾けて、障害物をよける</div>
      </div>
      <button id="resetBtn">リセット</button>
    </header>

    <div id="hud">
      <div>スコア <span id="score">0</span></div>
      <div>ミス <span id="miss">0</span>/3</div>
    </div>

    <canvas id="game"></canvas>

    <div id="debug">
      傾き gamma: <span id="gammaText">0.0</span>°　
      入力: <span id="inputText">0.00</span><br>
      <div class="bar"><div id="barFill"></div></div>
      <div class="small">PCでは <span class="kbd">←</span> <span class="kbd">→</span> キーでも操作できます。</div>
    </div>
  </div>

  <div id="overlay">
    <div id="panel">
      <h1>端末の「傾き」で動かすレース</h1>
      <p>
        これは、タップではなく「ちょっと左」「強く左」「中央に戻す」を練習する最小版です。
      </p>
      <p>
        スマホを少し傾けると少し動き、大きく傾けると大きく動きます。
      </p>
      <button id="startBtn">センサーを開始してスタート</button>
      <p class="small">
        iPhoneではボタンを押した後に許可が必要な場合があります。HTTPSで公開してスマホで開いてください。
      </p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const missEl = document.getElementById("miss");
    const gammaText = document.getElementById("gammaText");
    const inputText = document.getElementById("inputText");
    const barFill = document.getElementById("barFill");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");

    let W = 360, H = 640;
    let running = false;
    let last = 0;
    let score = 0;
    let miss = 0;

    // センサー値
    let rawGamma = 0;       // -90〜90: 左右の傾き
    let filteredGamma = 0;  // なめらかにした値
    let keyboardInput = 0;

    const player = {
      x: 0.5,
      y: 0.84,
      vx: 0,
      width: 42,
      height: 64
    };

    let obstacles = [];
    let spawnTimer = 0;
    let roadOffset = 0;

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      W = rect.width;
      H = rect.height;
    }
    window.addEventListener("resize", resize);
    resize();

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function resetGame() {
      score = 0;
      miss = 0;
      player.x = 0.5;
      player.vx = 0;
      obstacles = [];
      spawnTimer = 0;
      roadOffset = 0;
      updateHud();
    }

    function updateHud() {
      scoreEl.textContent = score;
      missEl.textContent = miss;
    }

    function getControlInput() {
      // gammaは左右の傾き。大きすぎる値は扱いにくいので ±25度で頭打ち。
      filteredGamma = filteredGamma * 0.84 + rawGamma * 0.16;
      const tiltInput = clamp(filteredGamma / 25, -1, 1);
      const input = keyboardInput !== 0 ? keyboardInput : tiltInput;

      gammaText.textContent = filteredGamma.toFixed(1);
      inputText.textContent = input.toFixed(2);
      barFill.style.width = `${(input + 1) * 50}%`;

      return input;
    }

    function spawnObstacle() {
      const laneX = 0.18 + Math.random() * 0.64;
      const size = 34 + Math.random() * 18;
      obstacles.push({
        x: laneX,
        y: -0.08,
        w: size,
        h: size,
        vy: 0.26 + Math.random() * 0.10,
        hit: false
      });
    }

    function rectsOverlap(a, b) {
      return Math.abs(a.cx - b.cx) < (a.w + b.w) / 2 &&
             Math.abs(a.cy - b.cy) < (a.h + b.h) / 2;
    }

    function update(dt) {
      if (!running) return;

      const input = getControlInput();

      // ここがアナログ運動出力の中心：
      // 傾きの強さが加速度になる。急に位置を変えず、速度を通して動かす。
      const accel = input * 1.65;
      player.vx += accel * dt;

      // 摩擦。中央に戻す・傾きを弱めると自然に落ち着く。
      player.vx *= Math.pow(0.08, dt);
      player.x += player.vx * dt;
      player.x = clamp(player.x, 0.10, 0.90);

      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnObstacle();
        spawnTimer = Math.max(0.48, 1.05 - score * 0.002);
      }

      for (const ob of obstacles) {
        ob.y += ob.vy * dt;
      }

      const carRect = {
        cx: player.x * W,
        cy: player.y * H,
        w: player.width,
        h: player.height
      };

      for (const ob of obstacles) {
        if (!ob.hit) {
          const obRect = { cx: ob.x * W, cy: ob.y * H, w: ob.w, h: ob.h };
          if (rectsOverlap(carRect, obRect)) {
            ob.hit = true;
            miss += 1;
            if (navigator.vibrate) navigator.vibrate(60);
            if (miss >= 3) {
              running = false;
              overlay.style.display = "grid";
              document.querySelector("#panel h1").textContent = "終了！";
              document.querySelector("#panel p").innerHTML =
                `スコアは <b>${score}</b> です。<br>もう一度やると、傾きの微調整がうまくなります。`;
              startBtn.textContent = "もう一度スタート";
            }
          }
        }
      }

      const before = obstacles.length;
      obstacles = obstacles.filter(ob => ob.y < 1.15 && !ob.hit);
      const passed = before - obstacles.length;
      if (passed > 0) score += passed * 10;

      roadOffset += dt * 260;
      updateHud();
    }

    function drawRoad() {
      ctx.fillStyle = "#0b1220";
      ctx.fillRect(0, 0, W, H);

      // road
      ctx.fillStyle = "#1f2937";
      ctx.fillRect(W * 0.08, 0, W * 0.84, H);

      // edges
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.fillRect(W * 0.08, 0, 4, H);
      ctx.fillRect(W * 0.92 - 4, 0, 4, H);

      // dashed center lines
      ctx.fillStyle = "rgba(255,255,255,0.45)";
      const dashH = 34;
      const gap = 34;
      for (let y = -dashH; y < H + dashH; y += dashH + gap) {
        const yy = (y + roadOffset) % (dashH + gap) - dashH;
        ctx.fillRect(W * 0.5 - 3, yy, 6, dashH);
      }
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawCar() {
      const x = player.x * W;
      const y = player.y * H;

      ctx.save();
      ctx.translate(x, y);

      // lean visual
      ctx.rotate(player.vx * 0.12);

      // shadow
      ctx.fillStyle = "rgba(0,0,0,0.38)";
      roundRect(-24, -28, 48, 62, 12);
      ctx.fill();

      // body
      ctx.fillStyle = "#f9fafb";
      roundRect(-21, -34, 42, 68, 12);
      ctx.fill();

      // window
      ctx.fillStyle = "#60a5fa";
      roundRect(-13, -22, 26, 22, 7);
      ctx.fill();

      // wheels
      ctx.fillStyle = "#111827";
      roundRect(-27, -22, 8, 20, 4);
      ctx.fill();
      roundRect(19, -22, 8, 20, 4);
      ctx.fill();
      roundRect(-27, 12, 8, 20, 4);
      ctx.fill();
      roundRect(19, 12, 8, 20, 4);
      ctx.fill();

      ctx.restore();
    }

    function drawObstacle(ob) {
      const x = ob.x * W;
      const y = ob.y * H;

      ctx.save();
      ctx.translate(x, y);

      // cone-like obstacle
      ctx.fillStyle = "#f97316";
      ctx.beginPath();
      ctx.moveTo(0, -ob.h / 2);
      ctx.lineTo(ob.w / 2, ob.h / 2);
      ctx.lineTo(-ob.w / 2, ob.h / 2);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.fillRect(-ob.w * 0.23, -2, ob.w * 0.46, 5);
      ctx.fillRect(-ob.w * 0.34, ob.h * 0.22, ob.w * 0.68, 5);

      ctx.restore();
    }

    function draw() {
      drawRoad();
      for (const ob of obstacles) drawObstacle(ob);
      drawCar();

      if (!running) {
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(0, 0, W, H);
      }
    }

    function loop(ts) {
      const dt = Math.min(0.033, (ts - last) / 1000 || 0);
      last = ts;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    async function startSensors() {
      resetGame();

      try {
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const response = await DeviceOrientationEvent.requestPermission();
          if (response !== "granted") {
            alert("傾きセンサーの許可が出ませんでした。PCキー操作またはAndroid/別ブラウザで試してください。");
          }
        }

        window.addEventListener("deviceorientation", (event) => {
          if (typeof event.gamma === "number") {
            rawGamma = event.gamma;
          }
        }, true);

      } catch (e) {
        console.log(e);
        alert("センサー開始でエラーが出ました。HTTPSで公開してスマホで開くと動きやすいです。");
      }

      overlay.style.display = "none";
      running = true;
      last = performance.now();
    }

    startBtn.addEventListener("click", startSensors);
    resetBtn.addEventListener("click", () => {
      resetGame();
      running = true;
      overlay.style.display = "none";
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") keyboardInput = -1;
      if (e.key === "ArrowRight") keyboardInput = 1;
    });

    window.addEventListener("keyup", (e) => {
      if (e.key === "ArrowLeft" && keyboardInput < 0) keyboardInput = 0;
      if (e.key === "ArrowRight" && keyboardInput > 0) keyboardInput = 0;
    });

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
