<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>G案：項と一次式を選ぶ</title>
<style>
:root{--bg:#f8f5ee;--card:#fff;--ink:#232323;--muted:#666;--line:#e7ded0;--accent:#2f6866;--soft:#e9f3f1;--ok:#197447;--warn:#8a5a00;--shadow:0 8px 20px rgba(0,0,0,.07)}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
button{font:inherit;letter-spacing:0}
.app{width:min(680px,100%);min-height:100svh;margin:0 auto;padding:10px 12px 18px}
header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
h1{margin:0;font-size:25px;line-height:1.2}
.sub{margin-top:2px;color:var(--muted);font-size:13px;line-height:1.4}
.toplink{color:var(--accent);text-decoration:none;font-weight:900;white-space:nowrap}
.progress{display:flex;gap:6px;margin-bottom:7px}
.pill{display:inline-flex;align-items:center;min-height:30px;padding:4px 9px;border-radius:999px;background:var(--soft);color:var(--accent);font-size:13px;font-weight:900}
.pill.step{margin-left:auto;background:#fff;border:1px solid var(--line)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:12px;margin:8px 0}
.problem-card{text-align:center;padding:13px 12px}
.stage-label{color:var(--accent);font-size:14px;font-weight:900;margin-bottom:4px}
.expression{font-size:46px;line-height:1.15;font-weight:1000}
.question{margin:8px 0 0;font-size:23px;line-height:1.35;font-weight:1000;color:var(--accent)}
.note{margin:7px 0 0;color:var(--muted);font-size:14px;font-weight:800;line-height:1.5}
.choice-grid{display:grid;gap:8px}
.choice-grid.two{grid-template-columns:1fr 1fr}
.choice{width:100%;min-height:54px;padding:8px 10px;border:2px solid var(--accent);border-radius:12px;background:#fff;color:var(--accent);font-size:20px;font-weight:1000;cursor:pointer}
.choice:active{transform:translateY(2px)}
.choice:disabled{opacity:.72;cursor:default}
.feedback{min-height:54px;margin-top:9px;padding:9px 10px;border:1px solid var(--line);border-radius:11px;background:#faf6ec;font-size:15px;line-height:1.45;white-space:pre-line}
.feedback.ok{background:#eef8f2;border-color:#bde4cf;color:var(--ok);font-weight:900}
.feedback.try{background:#fff7e6;border-color:#efcf91;color:var(--warn);font-weight:800}
.hidden{display:none}
.primary{width:100%;min-height:48px;margin-top:10px;border:0;border-radius:12px;background:var(--accent);box-shadow:0 5px 0 #214d4b;color:#fff;font-size:19px;font-weight:900;cursor:pointer}
.primary:active{transform:translateY(3px);box-shadow:0 2px 0 #214d4b}
.shake{animation:shake .24s linear}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.celebration{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1000}
.confetti{position:absolute;top:-60px;font-size:30px;animation:fall 2.7s linear forwards}
@keyframes fall{0%{transform:translateY(-80px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(420deg);opacity:0}}
.result{text-align:center;padding:22px 16px}
.big-celebrate{font-size:32px;font-weight:1000;line-height:1.35;color:var(--ok)}
.result-text{font-size:18px;font-weight:800;line-height:1.6}
.mistake-list{text-align:left;margin-top:10px}
.mistake-title{margin:0 0 8px;color:var(--accent);font-size:18px;font-weight:1000}
.mistake-item{padding:10px 0;border-top:1px solid var(--line);line-height:1.55}
.mistake-item:first-of-type{border-top:0}
.mistake-problem{font-weight:1000}
.mistake-meta{color:var(--muted);font-weight:800}
@media(max-width:420px){
  h1{font-size:22px}
  .expression{font-size:40px}
  .question{font-size:21px}
  .choice{min-height:52px;font-size:18px}
}
</style>
</head>
<body>
<main class="app">
  <header>
    <div>
      <h1>G案：項と一次式</h1>
      <div class="sub">計算の前に、式の形を見る練習</div>
    </div>
    <a class="toplink" href="index.html">一覧へ</a>
  </header>

  <div class="progress">
    <span class="pill" id="qPill">1問目 / 8問</span>
    <span class="pill" id="scorePill">ノーミス 0</span>
    <span class="pill step" id="stepPill">項</span>
  </div>

  <section class="card problem-card" id="problemCard">
    <div class="stage-label" id="stageText">Step 1</div>
    <div class="expression" id="expressionText"></div>
    <p class="question" id="questionText"></p>
    <p class="note" id="noteText">+ や - で項が分かれます。</p>
  </section>

  <section class="card" id="choiceCard">
    <div class="choice-grid" id="choiceGrid"></div>
    <div class="feedback" id="feedback" aria-live="polite">答えを選びます。</div>
  </section>
</main>

<script>
function playCorrectSound(){try{const A=window.AudioContext||window.webkitAudioContext,ctx=new A(),notes=[698,1047];notes.forEach((freq,i)=>{const start=ctx.currentTime+i*.14,o=ctx.createOscillator(),g=ctx.createGain();o.type="triangle";o.frequency.setValueAtTime(freq,start);g.gain.setValueAtTime(.0001,start);g.gain.exponentialRampToValueAtTime(.16,start+.012);g.gain.exponentialRampToValueAtTime(.0001,start+.16);o.connect(g);g.connect(ctx.destination);o.start(start);o.stop(start+.17)})}catch(e){}}
function showConfetti(){const layer=document.createElement("div");layer.className="celebration";const pieces=["🎉","✨","🌟","💮","👏","🎊"];for(let i=0;i<38;i++){const piece=document.createElement("span");piece.className="confetti";piece.textContent=pieces[Math.floor(Math.random()*pieces.length)];piece.style.left=Math.random()*100+"vw";piece.style.animationDelay=Math.random()*.7+"s";piece.style.fontSize=22+Math.random()*24+"px";layer.appendChild(piece)}document.body.appendChild(layer);setTimeout(()=>layer.remove(),3600)}

const QUESTIONS=[
  {expression:"4x",terms:"4x",termCount:1,isLinear:true,category:"基本",memoHint:"文字の項が1次なら、一次式です。",termChoices:["4 と x","4x","4","x"],countChoices:["2つ","3つ","1つ","4つ"],linearChoices:["一次式ではない","一次式である"],termHint:"+ や - がないので、項は 4x の1つです。",linearHint:"4x は文字が1つだけの項です。一次式です。"},
  {expression:"7 - 3a",terms:"7 と -3a",termCount:2,isLinear:true,category:"定数項あり",memoHint:"-3a のマイナスも項に入れます。",termChoices:["7 と -3a","7 と 3a","7 - 3 と a","7 - 3a で1つ"],countChoices:["1つ","2つ","3つ","4つ"],linearChoices:["一次式である","一次式ではない"],termHint:"-3a のマイナスも項に入れます。",linearHint:"数だけの項はあっても大丈夫です。-3a は1次の項です。"},
  {expression:"-x + 2y + 6",terms:"-x と 2y と 6",termCount:3,isLinear:true,category:"項3つ・複数文字",memoHint:"+ や - で分けて、マイナスも項に入れます。",termChoices:["x と 2y と 6","-x + 2y と 6","-x と 2y と 6","-x と 2y + 6"],countChoices:["1つ","2つ","4つ","3つ"],linearChoices:["一次式ではない","一次式である"],termHint:"+ で分かれます。-x のマイナスも項に入れます。",linearHint:"-x と 2y はどちらも1次の項です。数だけの項もあって大丈夫です。"},
  {expression:"5ab + 2c",terms:"5ab と 2c",termCount:2,isLinear:false,category:"文字×文字",memoHint:"ab は a × b です。",termChoices:["5a と b と 2c","5 と ab と 2c","5ab + 2c で1つ","5ab と 2c"],countChoices:["2つ","1つ","3つ","4つ"],linearChoices:["一次式ではない","一次式である"],termHint:"+ で、5ab と 2c に分かれます。",linearHint:"ここを見よう：5ab\n5ab は 5 × a × b です。\n文字が2つかけ算されているので、一次式ではありません。"},
  {expression:"3a - 5x",terms:"3a と -5x",termCount:2,isLinear:true,category:"複数文字",memoHint:"-5x のマイナスも項に入れます。",termChoices:["3a と 5x","3a と -5x","3 と a と -5x","3a - 5x で1つ"],countChoices:["1つ","3つ","2つ","4つ"],linearChoices:["一次式ではない","一次式である"],termHint:"-5x のマイナスも項に入れます。",linearHint:"3a も -5x も1次の項です。一次式です。"},
  {expression:"x² + 3",terms:"x² と 3",termCount:2,isLinear:false,category:"2乗",memoHint:"x² は x の2乗です。",termChoices:["x と 2 と 3","x² + 3 で1つ","x² と 3","x と 3"],countChoices:["1つ","3つ","4つ","2つ"],linearChoices:["一次式である","一次式ではない"],termHint:"+ で、x² と 3 に分かれます。",linearHint:"ここを見よう：x²\nx² は x の2乗です。\n2乗の項があるので、一次式ではありません。"},
  {expression:"2x + 3y - 4",terms:"2x と 3y と -4",termCount:3,isLinear:true,category:"項3つ・定数項あり",memoHint:"-4 のマイナスも項に入れます。",termChoices:["2x と 3y と 4","2 と x と 3y と -4","2x + 3y と -4","2x と 3y と -4"],countChoices:["3つ","1つ","2つ","4つ"],linearChoices:["一次式である","一次式ではない"],termHint:"+ と - で分かれます。-4 のマイナスも項に入れます。",linearHint:"2x と 3y は1次の項です。数だけの項もあって大丈夫です。"},
  {expression:"3xy - 2",terms:"3xy と -2",termCount:2,isLinear:false,category:"文字×文字",memoHint:"xy は x × y です。",termChoices:["3x と y と -2","3xy と -2","3 と xy と -2","3xy - 2 で1つ"],countChoices:["1つ","2つ","4つ","3つ"],linearChoices:["一次式ではない","一次式である"],termHint:"-2 のマイナスも項に入れます。",linearHint:"ここを見よう：3xy\n3xy は 3 × x × y です。\n文字が2つかけ算されているので、一次式ではありません。"}
];

const STEPS=[
  {key:"terms",label:"項",title:"項を選ぶ",note:"+ や - で項が分かれます。",question:"項の分け方は？"},
  {key:"count",label:"項の数",title:"項の数を選ぶ",note:"分けた項を数えます。",question:"項はいくつ？"},
  {key:"linear",label:"一次式",title:"一次式か選ぶ",note:"文字が2つかけ算されている項や2乗の項がないか見ます。",question:"一次式ですか？"}
];

let qIndex=0,stepIndex=0,noMissCount=0,locked=false,resultSent=false;
let isReviewMode=false,reviewTargets=[],reviewIndex=0;
let problemMistakes=QUESTIONS.map(()=>({terms:false,count:false,linear:false}));

function setText(id,text){document.getElementById(id).textContent=text}
function setFeedback(text,type=""){const el=document.getElementById("feedback");el.className=`feedback${type?` ${type}`:""}`;el.textContent=text}
function setVisible(id,visible){document.getElementById(id).classList.toggle("hidden",!visible)}
function clearShake(){document.querySelectorAll(".shake").forEach(el=>el.classList.remove("shake"))}
function markShake(){const el=document.getElementById("choiceCard");el.classList.remove("shake");void el.offsetWidth;el.classList.add("shake");el.addEventListener("animationend",()=>el.classList.remove("shake"),{once:true})}
function currentQuestionIndex(){return isReviewMode?reviewTargets[reviewIndex]:qIndex}
function currentStep(){return STEPS[stepIndex]}
function questionMistake(m){return m.terms||m.count||m.linear}
function correctCount(){return problemMistakes.filter(m=>!questionMistake(m)).length}
function buildReviewTargets(){return problemMistakes.reduce((targets,m,index)=>{if(questionMistake(m))targets.push(index);return targets},[])}
function stepAnswer(q,step){if(step.key==="terms")return q.terms;if(step.key==="count")return `${q.termCount}つ`;return q.isLinear?"一次式である":"一次式ではない"}
function stepChoices(q,step){if(step.key==="terms")return q.termChoices;if(step.key==="count")return q.countChoices;return q.linearChoices}
function stepHint(q,step){if(step.key==="terms")return q.termHint;if(step.key==="count")return "+ や - で分けた項を、もう一度数えます。";return q.linearHint}
function stepOkMessage(q,step){if(step.key==="terms"&&q.expression.includes("-"))return "マイナスも項に入れられたね。";if(step.key==="linear"&&!q.isLinear)return q.expression.includes("ab")||q.expression.includes("xy")?"文字×文字を見つけられたね。":"2乗を見つけられたね。";return "正解！"}
function finishFirstRound(){reviewTargets=buildReviewTargets();if(reviewTargets.length){showReviewIntro();return}showResult()}
function advanceStep(){
  stepIndex++;
  if(stepIndex<STEPS.length){render();return}
  if(isReviewMode){reviewIndex++;stepIndex=0;render();return}
  if(!questionMistake(problemMistakes[qIndex])){noMissCount++;setText("scorePill",`ノーミス ${noMissCount}`)}
  qIndex++;stepIndex=0;render();
}
function mistakeMemoHtml(){
  return `<div class="mistake-list"><h2 class="mistake-title">間違いメモ</h2>${reviewTargets.map(index=>{const q=QUESTIONS[index];return `<div class="mistake-item"><div class="mistake-problem">${q.expression}</div><div class="mistake-meta">分類：${q.category}</div><div>ヒント：${q.memoHint}</div></div>`}).join("")}</div>`;
}

function makeChoices(q,step){
  const grid=document.getElementById("choiceGrid");
  const choices=stepChoices(q,step);
  grid.className=`choice-grid${choices.length===2?" two":""}`;
  grid.replaceChildren();
  choices.forEach(choice=>{const button=document.createElement("button");button.type="button";button.className="choice";button.textContent=choice;button.addEventListener("click",()=>checkChoice(choice));grid.appendChild(button)});
}

function render(){
  if(isReviewMode){if(reviewIndex>=reviewTargets.length){showResult();return}}else if(qIndex>=QUESTIONS.length){finishFirstRound();return}
  clearShake();
  const q=QUESTIONS[currentQuestionIndex()],step=currentStep();
  locked=false;
  setVisible("problemCard",true);
  setVisible("choiceCard",true);
  setText("qPill",isReviewMode?`復習 ${reviewIndex+1}問目 / ${reviewTargets.length}問`:`${qIndex+1}問目 / ${QUESTIONS.length}問`);
  setText("scorePill",`ノーミス ${noMissCount}`);
  setText("stepPill",step.label);
  setText("stageText",`${step.title} / ${stepIndex+1}・3`);
  setText("expressionText",q.expression);
  setText("questionText",step.question);
  setText("noteText",step.note);
  setFeedback("答えを選びます。");
  makeChoices(q,step);
}

function checkChoice(choice){
  if(locked)return;
  const q=QUESTIONS[currentQuestionIndex()],step=currentStep(),answer=stepAnswer(q,step);
  if(choice===answer){
    locked=true;
    document.querySelectorAll(".choice").forEach(button=>button.disabled=true);
    playCorrectSound();
    setFeedback(stepOkMessage(q,step),"ok");
    setTimeout(advanceStep,850);
  }else{
    if(!isReviewMode)problemMistakes[currentQuestionIndex()][step.key]=true;
    setFeedback(stepHint(q,step),"try");
    markShake();
  }
}

function showReviewIntro(){
  clearShake();
  setText("qPill",`復習 ${reviewTargets.length}問`);
  setText("stepPill","復習");
  setVisible("problemCard",false);
  setVisible("choiceCard",false);
  let card=document.getElementById("reviewIntroCard");
  if(!card){card=document.createElement("section");card.id="reviewIntroCard";card.className="card result";document.querySelector(".app").appendChild(card)}
  card.innerHTML=`<p class="question">${QUESTIONS.length}問中 ${correctCount()}問 ノーミス</p><p class="result-text">まちがえた問題をもう一度やってみよう。</p>${mistakeMemoHtml()}<button class="primary" type="button" onclick="startReview()">もう一度</button>`;
}
function startReview(){clearShake();const card=document.getElementById("reviewIntroCard");if(card)card.remove();isReviewMode=true;reviewIndex=0;stepIndex=0;render()}
function sendResult(){
  if(resultSent)return;
  resultSent=true;
  const count=correctCount();
  const wrongProblems=[];
  problemMistakes.forEach((m,index)=>{const q=QUESTIONS[index];if(m.terms)wrongProblems.push(`[項] ${q.expression}`);if(m.count)wrongProblems.push(`[項の数] ${q.expression}`);if(m.linear)wrongProblems.push(`[一次式] ${q.expression}`)});
  const data={studentId:"takumi",appId:"mojishiki-normal-basic-input",mode:"G",totalQuestions:QUESTIONS.length,correctCount:count,allCorrect:count===QUESTIONS.length,wrongProblems,device:navigator.userAgent,note:reviewTargets.length?"復習あり":"復習なし"};
  fetch("https://script.google.com/macros/s/AKfycbyB1kGi_sCQ5trrAA_o1c-6tn87LY0di6rqIkssJ6vIacZ2IN4Y65jj9vCWoIwaH9aV/exec",{method:"POST",mode:"no-cors",body:JSON.stringify(data)}).catch(error=>console.warn("結果を送信できませんでした。",error))
}

function showResult(){
  const reviewed=reviewTargets.length>0;
  clearShake();
  showConfetti();
  document.querySelector(".app").innerHTML=`<header><div><h1>結果</h1><div class="sub">項と一次式を選ぶ練習</div></div><a class="toplink" href="index.html">一覧へ</a></header><section class="card result"><div class="big-celebrate">${reviewed?"クリア！よく直せたね！":"式の形を見分けられました！"}</div><p class="result-text">${reviewed?"まちがえた問題も、もう一度正解できました。":"項と一次式を、ていねいに見る練習ができました。"}</p><button class="primary" type="button" onclick="location.reload()">もう一度</button></section>`;
  sendResult();
}

render();
</script>
</body>
</html>
