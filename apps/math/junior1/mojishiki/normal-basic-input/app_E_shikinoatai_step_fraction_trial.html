<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>E案：式の値 ステップ練習</title>
<style>
:root{--bg:#f8f5ee;--card:#fff;--ink:#232323;--muted:#666;--line:#e7ded0;--accent:#2f6866;--soft:#e9f3f1;--ok:#197447;--warn:#8a5a00;--shadow:0 8px 20px rgba(0,0,0,.07)}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
button,input{font:inherit;letter-spacing:0}
.app{width:min(680px,100%);min-height:100svh;margin:0 auto;padding:10px 12px 18px}
header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:7px}
h1{margin:0;font-size:25px;line-height:1.2}
.sub{margin-top:2px;color:var(--muted);font-size:13px;line-height:1.4}
.toplink{color:var(--accent);text-decoration:none;font-weight:900;white-space:nowrap}
.progress{display:flex;gap:6px;margin-bottom:7px}
.pill{display:inline-flex;align-items:center;min-height:30px;padding:4px 9px;border-radius:999px;background:var(--soft);color:var(--accent);font-size:13px;font-weight:900}
.pill.step{margin-left:auto;background:#fff;border:1px solid var(--line)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:12px;margin:8px 0}
.problem-card{text-align:center;padding:11px 12px}
.condition{font-size:18px;font-weight:900;color:var(--accent)}
.expression-row{display:flex;justify-content:center;align-items:baseline;gap:8px;margin:3px 0}
.expression{font-size:42px;line-height:1.12;font-weight:1000}
.value-label{font-size:18px;font-weight:900}
.reading{min-height:24px;color:var(--muted);font-size:15px;font-weight:800;white-space:pre-line}
.fraction-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:end;min-height:68px}
.fraction-row .fraction-expression{grid-column:2}
.fraction-row .value-label{grid-column:3;justify-self:start;margin:0 0 5px 8px}
.math-fraction{display:inline-grid;grid-template-rows:auto auto;min-width:48px;font-size:30px;line-height:1;text-align:center;vertical-align:middle}
.fraction-top{padding:0 9px 4px;border-bottom:2px solid currentColor}
.fraction-bottom{padding:4px 9px 0}
.stage-label{color:var(--accent);font-size:14px;font-weight:900;margin-bottom:2px}
.prompt{margin:0 0 9px;font-size:20px;line-height:1.35;font-weight:900}
.choice-grid{display:grid;gap:7px}
.choice{width:100%;min-height:49px;padding:8px 10px;border:2px solid var(--accent);border-radius:12px;background:#fff;color:var(--accent);font-size:18px;font-weight:900;cursor:pointer}
.choice:active,.key:active{transform:translateY(2px)}
.choice:disabled{opacity:.72;cursor:default}
.work-summary{text-align:center;margin-bottom:7px}
.work-summary small{display:block;color:var(--muted);font-size:13px;font-weight:800}
.work-expression{display:block;font-size:28px;line-height:1.25;font-weight:1000}
.order-note{margin:-1px 0 7px;text-align:center;color:var(--accent);font-size:14px;font-weight:900}
.answer-input{width:100%;height:52px;border:3px solid var(--accent);border-radius:12px;background:#fff;color:var(--ink);padding:4px 10px;text-align:center;font-size:34px;font-weight:1000}
.answer-input:focus{outline:3px solid #cfe7e3}
.keypad{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.key{height:42px;border:2px solid #dfd4c4;border-radius:10px;background:#fff;box-shadow:0 3px 0 #dfd4c4;font-size:20px;font-weight:900;cursor:pointer}
.key.zero{grid-column:1 / -1}
.primary{width:100%;min-height:48px;margin-top:9px;border:0;border-radius:12px;background:var(--accent);box-shadow:0 5px 0 #214d4b;color:#fff;font-size:19px;font-weight:900;cursor:pointer}
.primary:active{transform:translateY(3px);box-shadow:0 2px 0 #214d4b}
.feedback{min-height:44px;margin-top:8px;padding:8px 10px;border:1px solid var(--line);border-radius:11px;background:#faf6ec;font-size:14px;line-height:1.45}
.feedback.ok{background:#eef8f2;border-color:#bde4cf;color:var(--ok);font-weight:900}
.feedback.try{background:#fff7e6;border-color:#efcf91;color:var(--warn);font-weight:800}
.hidden{display:none}
.shake{animation:shake .24s linear}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.celebration{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1000}
.confetti{position:absolute;top:-60px;font-size:30px;animation:fall 2.7s linear forwards}
@keyframes fall{0%{transform:translateY(-80px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(420deg);opacity:0}}
.result{text-align:center;padding:22px 16px}
.big-celebrate{font-size:32px;font-weight:1000;line-height:1.35;color:var(--ok)}
.result-text{font-size:18px;font-weight:800;line-height:1.6}
.restart{margin-top:14px}
@media(max-width:420px){
  h1{font-size:22px}
  .expression{font-size:36px}
  .card{padding:10px}
  .choice{min-height:46px;font-size:17px}
  .work-expression{font-size:25px}
  .feedback{min-height:42px}
}
</style>
</head>
<body>
<main class="app">
  <header>
    <div>
      <h1>E案：式の値</h1>
      <div class="sub">代入を小さなステップで確認</div>
    </div>
    <a class="toplink" href="index.html">一覧へ</a>
  </header>

  <div class="progress">
    <span class="pill" id="qPill">1問目 / 8問</span>
    <span class="pill" id="scorePill">正解 0</span>
    <span class="pill step" id="stepPill">代入</span>
  </div>

  <section class="card problem-card" id="problemCard">
    <div class="condition" id="conditionText"></div>
    <div class="expression-row">
      <span class="expression" id="expressionText"></span>
      <span class="value-label">の値</span>
    </div>
    <div class="reading" id="readingText"></div>
  </section>

  <section class="card" id="substitutionCard">
    <div class="stage-label">代入</div>
    <p class="prompt">代入した式はどれ？</p>
    <div class="choice-grid" id="substitutionChoices"></div>
    <div class="feedback" id="substitutionFeedback" aria-live="polite">xを数字に置きかえます。</div>
  </section>

  <section class="card hidden" id="orderCard">
    <div class="work-summary">
      <small>代入すると</small>
      <strong class="work-expression" id="orderExpression"></strong>
    </div>
    <p class="prompt">先に計算するところはどこ？</p>
    <div class="choice-grid" id="orderChoices"></div>
    <div class="feedback" id="orderFeedback" aria-live="polite">計算する順番を選びます。</div>
  </section>

  <section class="card hidden" id="answerCard">
    <div class="work-summary">
      <small>代入すると</small>
      <strong class="work-expression" id="answerExpression"></strong>
    </div>
    <div class="order-note hidden" id="orderNote"></div>
    <p class="prompt">式の値を入力しよう</p>
    <input id="answerInput" class="answer-input" autocomplete="off" autocapitalize="none" inputmode="none" readonly aria-label="式の値" placeholder="答え">
    <div class="keypad">
      <button class="key" type="button" onclick="addToInput('1')">1</button>
      <button class="key" type="button" onclick="addToInput('2')">2</button>
      <button class="key" type="button" onclick="addToInput('3')">3</button>
      <button class="key" type="button" onclick="deleteInput()" title="1文字消す" aria-label="1文字消す">⌫</button>
      <button class="key" type="button" onclick="addToInput('4')">4</button>
      <button class="key" type="button" onclick="addToInput('5')">5</button>
      <button class="key" type="button" onclick="addToInput('6')">6</button>
      <button class="key" type="button" onclick="addToInput('-')">−</button>
      <button class="key" type="button" onclick="addToInput('7')">7</button>
      <button class="key" type="button" onclick="addToInput('8')">8</button>
      <button class="key" type="button" onclick="addToInput('9')">9</button>
      <button class="key" type="button" onclick="clearInput()" title="全部消す" aria-label="全部消す">C</button>
      <button class="key zero" type="button" onclick="addToInput('0')">0</button>
    </div>
    <button class="primary" type="button" onclick="checkAnswer()">答え合わせ</button>
    <div class="feedback" id="answerFeedback" aria-live="polite">数字ボタンで答えを入力します。</div>
  </section>
</main>

<script>
function playCorrectSound(){try{const A=window.AudioContext||window.webkitAudioContext,ctx=new A(),notes=[698,1047];notes.forEach((freq,i)=>{const start=ctx.currentTime+i*.14,o=ctx.createOscillator(),g=ctx.createGain();o.type="triangle";o.frequency.setValueAtTime(freq,start);g.gain.setValueAtTime(.0001,start);g.gain.exponentialRampToValueAtTime(.16,start+.012);g.gain.exponentialRampToValueAtTime(.0001,start+.16);o.connect(g);g.connect(ctx.destination);o.start(start);o.stop(start+.17)})}catch(e){}}
function playCelebrationSound(){try{const A=window.AudioContext||window.webkitAudioContext,ctx=new A(),notes=[523,659,784,1046];notes.forEach((freq,i)=>{const o=ctx.createOscillator(),g=ctx.createGain(),start=ctx.currentTime+i*.12;o.type="sine";o.frequency.setValueAtTime(freq,start);g.gain.setValueAtTime(.0001,start);g.gain.exponentialRampToValueAtTime(.16,start+.02);g.gain.exponentialRampToValueAtTime(.0001,start+.18);o.connect(g);g.connect(ctx.destination);o.start(start);o.stop(start+.2)})}catch(e){}}
function showConfetti(){const layer=document.createElement("div");layer.className="celebration";const pieces=["🎉","✨","🌟","💮","👏","🎊"];for(let i=0;i<38;i++){const piece=document.createElement("span");piece.className="confetti";piece.textContent=pieces[Math.floor(Math.random()*pieces.length)];piece.style.left=Math.random()*100+"vw";piece.style.animationDelay=Math.random()*.7+"s";piece.style.fontSize=22+Math.random()*24+"px";layer.appendChild(piece)}document.body.appendChild(layer);setTimeout(()=>layer.remove(),3600)}

const QUESTIONS=[
  {
    condition:"x = 2",expression:"3x",reading:"3x は 3 × x",
    substituted:"3 × 2",substitutionChoices:["3 + 2","3 × 2"],answer:6,
    substitutionHint:"3x は 3 × x。xを2に置きかえます。",
    answerHint:"3 × 2 を計算します。"
  },
  {
    condition:"x = -2",expression:"3x",reading:"3x は 3 × x",
    substituted:"3 × (-2)",substitutionChoices:["3 × (-2)","3 - 2"],answer:-6,
    substitutionHint:"負の数は、(-2)のようにかっこに入れます。",
    answerHint:"プラスとマイナスのかけ算は、マイナスです。"
  },
  {
    condition:"x = 2",expression:"-x",reading:"-x は x の反対",
    substituted:"-(2)",substitutionChoices:["-(-2)","-(2)"],answer:-2,
    substitutionHint:"xは2です。-xは、2の反対を表します。",
    answerHint:"2の反対は -2 です。"
  },
  {
    condition:"x = -2",expression:"-x",reading:"-x は x の反対",
    substituted:"-(-2)",substitutionChoices:["-(2)","-(-2)"],answer:2,
    substitutionHint:"xのところに、かっこをつけた(-2)を入れます。",
    answerHint:"-(-2)は、-2の反対なので2です。"
  },
  {
    condition:"x = -2",expression:"-3x",reading:"-3x は -3 × x",
    substituted:"-3 × (-2)",substitutionChoices:["-3 × (-2)","-3 × 2"],answer:6,
    substitutionHint:"-3xを -3 × x と見て、xに(-2)を入れます。",
    answerHint:"マイナスとマイナスのかけ算は、プラスです。"
  },
  {
    condition:"x = -2",expression:"x + 5",reading:"xを(-2)に置きかえる",
    substituted:"(-2) + 5",substitutionChoices:["2 + 5","(-2) + 5"],answer:3,
    substitutionHint:"xは-2なので、(-2)のようにかっこに入れます。",
    answerHint:"-2から右へ5進むと3です。"
  },
  {
    condition:"x = -2",expression:"5 + 2x",reading:"2x は 2 × x",
    substituted:"5 + 2 × (-2)",substitutionChoices:["5 + 2 × (-2)","(5 + 2) × (-2)"],answer:1,
    substitutionHint:"2xは2 × x。xに(-2)を入れます。",
    answerHint:"先に2 × (-2)=-4。そのあと5 + (-4)を計算します。",
    orderCheck:{choices:["5 + 2","2 × (-2)","5 + (-2)"],answer:"2 × (-2)",hint:"たし算より、かけ算を先に計算します。"}
  },
  {
    condition:"x = -2",expression:"6/x",reading:"分数は、わり算に直せます\n6 / x は 6 ÷ x と同じ",fraction:{numerator:"6",denominator:"x"},
    substituted:"6 ÷ (-2)",substitutionChoices:["(-2) ÷ 6","6 ÷ (-2)"],answer:-3,
    substitutionHint:"6/xは6 ÷ x。xに(-2)を入れます。",
    answerHint:"6 ÷ 2=3。プラス÷マイナスなので-3です。"
  }
];

let qIndex=0,score=0,answerLocked=false,transitionLocked=false,resultSent=false;
let problemMistakes=QUESTIONS.map(()=>({substitution:false,order:false,answer:false}));

function setVisible(id,visible){document.getElementById(id).classList.toggle("hidden",!visible)}
function setText(id,text){document.getElementById(id).textContent=text}
function setFeedback(id,text,type=""){const el=document.getElementById(id);el.className=`feedback${type?` ${type}`:""}`;el.textContent=text}
function markShake(id){const el=document.getElementById(id);el.classList.remove("shake");void el.offsetWidth;el.classList.add("shake")}
function makeChoices(containerId,choices,handler){const container=document.getElementById(containerId);container.replaceChildren();choices.forEach(choice=>{const button=document.createElement("button");button.type="button";button.className="choice";button.textContent=choice;button.addEventListener("click",()=>handler(choice));container.appendChild(button)})}
function renderExpression(q){const expression=document.getElementById("expressionText"),row=expression.parentElement;row.classList.toggle("fraction-row",Boolean(q.fraction));expression.classList.toggle("fraction-expression",Boolean(q.fraction));expression.replaceChildren();if(!q.fraction){expression.textContent=q.expression;return}const fraction=document.createElement("span"),top=document.createElement("span"),bottom=document.createElement("span");fraction.className="math-fraction";fraction.setAttribute("role","img");fraction.setAttribute("aria-label",`${q.fraction.numerator} わる ${q.fraction.denominator}`);top.className="fraction-top";top.textContent=q.fraction.numerator;bottom.className="fraction-bottom";bottom.textContent=q.fraction.denominator;fraction.append(top,bottom);expression.appendChild(fraction)}

function render(){
  if(qIndex>=QUESTIONS.length){showResult();return}
  const q=QUESTIONS[qIndex];
  answerLocked=false;transitionLocked=false;
  setText("qPill",`${qIndex+1}問目 / ${QUESTIONS.length}問`);
  setText("scorePill",`正解 ${score}`);
  setText("stepPill","代入");
  setText("conditionText",`${q.condition} のとき`);
  renderExpression(q);
  setText("readingText",q.reading);
  setVisible("substitutionCard",true);
  setVisible("orderCard",false);
  setVisible("answerCard",false);
  setFeedback("substitutionFeedback","xを数字に置きかえます。");
  setFeedback("orderFeedback","計算する順番を選びます。");
  setFeedback("answerFeedback","数字ボタンで答えを入力します。");
  document.getElementById("answerInput").value="";
  makeChoices("substitutionChoices",q.substitutionChoices,checkSubstitution);
}

function checkSubstitution(choice){
  if(transitionLocked)return;
  const q=QUESTIONS[qIndex];
  if(choice===q.substituted){
    transitionLocked=true;
    document.querySelectorAll("#substitutionChoices .choice").forEach(button=>button.disabled=true);
    setFeedback("substitutionFeedback","その式です。","ok");
    setTimeout(()=>q.orderCheck?showOrderStep():showAnswerStep(),350);
  }else{
    problemMistakes[qIndex].substitution=true;
    setFeedback("substitutionFeedback",q.substitutionHint,"try");
    markShake("substitutionCard");
  }
}

function showOrderStep(){
  const q=QUESTIONS[qIndex];
  transitionLocked=false;
  setVisible("substitutionCard",false);
  setVisible("orderCard",true);
  setText("stepPill","計算順");
  setText("orderExpression",q.substituted);
  makeChoices("orderChoices",q.orderCheck.choices,checkOrder);
}

function checkOrder(choice){
  if(transitionLocked)return;
  const q=QUESTIONS[qIndex];
  if(choice===q.orderCheck.answer){
    transitionLocked=true;
    document.querySelectorAll("#orderChoices .choice").forEach(button=>button.disabled=true);
    setFeedback("orderFeedback","かけ算を先にします。","ok");
    setTimeout(showAnswerStep,350);
  }else{
    problemMistakes[qIndex].order=true;
    setFeedback("orderFeedback",q.orderCheck.hint,"try");
    markShake("orderCard");
  }
}

function showAnswerStep(){
  const q=QUESTIONS[qIndex];
  transitionLocked=false;
  setVisible("substitutionCard",false);
  setVisible("orderCard",false);
  setVisible("answerCard",true);
  setText("stepPill","答え");
  setText("answerExpression",q.substituted);
  const orderNote=document.getElementById("orderNote");
  if(q.orderCheck){orderNote.textContent=`${q.orderCheck.answer} を先に計算します。`;orderNote.classList.remove("hidden")}else{orderNote.textContent="";orderNote.classList.add("hidden")}
  document.getElementById("answerInput").value="";
  setFeedback("answerFeedback","数字ボタンで答えを入力します。");
}

function addToInput(value){if(!answerLocked)document.getElementById("answerInput").value+=value}
function deleteInput(){if(answerLocked)return;const input=document.getElementById("answerInput");input.value=input.value.slice(0,-1)}
function clearInput(){if(!answerLocked)document.getElementById("answerInput").value=""}
function normalizeNumber(value){const fullWidth="０１２３４５６７８９";let out=value.trim().replace(/[０-９]/g,char=>String(fullWidth.indexOf(char))).replace(/[−ー－]/g,"-").replace(/\s+/g,"");if(!/^-?\d+$/.test(out))return null;return Number(out)}

function checkAnswer(){
  if(answerLocked)return;
  const q=QUESTIONS[qIndex],input=document.getElementById("answerInput"),value=normalizeNumber(input.value);
  if(value===null){setFeedback("answerFeedback","まず答えを入力してください。","try");markShake("answerCard");return}
  if(value===q.answer){
    answerLocked=true;score++;setText("scorePill",`正解 ${score}`);playCorrectSound();
    setFeedback("answerFeedback",`正解！ 答えは ${q.answer} です。`,"ok");
    setTimeout(()=>{qIndex++;render()},850);
  }else{
    problemMistakes[qIndex].answer=true;
    setFeedback("answerFeedback",q.answerHint,"try");
    markShake("answerCard");
  }
}

function problemLabel(q){return `${q.condition} のとき ${q.expression} の値`}
function isProblemCorrect(m,index){return !m.substitution&&!m.answer&&(!QUESTIONS[index].orderCheck||!m.order)}
function sendResult(){
  if(resultSent)return;
  resultSent=true;
  const correctCount=problemMistakes.filter(isProblemCorrect).length;
  const wrongProblems=[];
  problemMistakes.forEach((m,index)=>{
    const problem=problemLabel(QUESTIONS[index]);
    if(m.substitution)wrongProblems.push(`[代入式] ${problem}`);
    if(m.order)wrongProblems.push(`[計算順序] ${problem}`);
    if(m.answer)wrongProblems.push(`[答え] ${problem}`);
  });
  const data={studentId:"takumi",appId:"mojishiki-normal-basic-input",mode:"E_FRACTION_TRIAL",totalQuestions:QUESTIONS.length,correctCount,allCorrect:correctCount===QUESTIONS.length,wrongProblems,device:navigator.userAgent,note:""};
  fetch("https://script.google.com/macros/s/AKfycbyB1kGi_sCQ5trrAA_o1c-6tn87LY0di6rqIkssJ6vIacZ2IN4Y65jj9vCWoIwaH9aV/exec",{method:"POST",mode:"no-cors",body:JSON.stringify(data)}).catch(error=>console.warn("結果を送信できませんでした。",error))
}

function showResult(){
  showConfetti();playCelebrationSound();
  document.querySelector(".app").innerHTML=`<header><div><h1>結果</h1><div class="sub">式の値 ステップ練習</div></div><a class="toplink" href="index.html">一覧へ</a></header><section class="card result"><div class="big-celebrate">8問ぜんぶできました！</div><p class="result-text">代入して、式の値を求められました。</p><button class="primary restart" type="button" onclick="location.reload()">もう一度</button></section>`;
  sendResult();
}

render();
</script>
</body>
</html>
