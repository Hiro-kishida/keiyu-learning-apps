<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>D+案：かっこあり・なし 作戦練習</title>
<style>
:root{--bg:#f8f5ee;--card:#fff;--ink:#232323;--muted:#666;--line:#e7ded0;--accent:#2f6866;--soft:#e9f3f1;--ok:#197447;--warn:#8a5a00;--shadow:0 8px 20px rgba(0,0,0,.07)}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
button,input{font:inherit;letter-spacing:0}
.app{width:min(680px,100%);min-height:100svh;margin:0 auto;padding:10px 12px 18px}
header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:7px}
h1{margin:0;font-size:23px;line-height:1.25}
.sub{margin-top:2px;color:var(--muted);font-size:13px;line-height:1.4}
.toplink{color:var(--accent);text-decoration:none;font-weight:900;white-space:nowrap}
.progress{display:flex;gap:6px;margin-bottom:7px}
.pill{display:inline-flex;align-items:center;min-height:30px;padding:4px 9px;border-radius:999px;background:var(--soft);color:var(--accent);font-size:13px;font-weight:900}
.pill.step{margin-left:auto;background:#fff;border:1px solid var(--line)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:12px;margin:8px 0}
.problem-card{text-align:center;padding:13px 10px}
.problem-card small{display:block;color:var(--muted);font-size:13px;font-weight:800;margin-bottom:4px}
.problem{font-size:36px;line-height:1.2;font-weight:1000;overflow-wrap:anywhere}
.stage-label{color:var(--accent);font-size:14px;font-weight:900;margin-bottom:2px}
.prompt{margin:0 0 9px;font-size:20px;line-height:1.35;font-weight:900}
.choice-grid{display:grid;gap:7px}
.choice{width:100%;min-height:49px;padding:8px 10px;border:2px solid var(--accent);border-radius:12px;background:#fff;color:var(--accent);font-size:17px;font-weight:900;cursor:pointer}
.choice:active,.key:active{transform:translateY(2px)}
.choice:disabled{opacity:.72;cursor:default}
.work-summary{text-align:center;margin-bottom:8px}
.work-summary small{display:block;color:var(--muted);font-size:13px;font-weight:800}
.work-expression{display:block;font-size:28px;line-height:1.3;font-weight:1000;overflow-wrap:anywhere}
.answer-input{width:100%;height:54px;border:3px solid var(--accent);border-radius:12px;background:#fff;color:var(--ink);padding:4px 10px;text-align:center;font-size:32px;font-weight:1000}
.answer-input:focus{outline:3px solid #cfe7e3}
.keypad{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}
.key{height:43px;border:2px solid #dfd4c4;border-radius:10px;background:#fff;box-shadow:0 3px 0 #dfd4c4;font-size:20px;font-weight:900;cursor:pointer}
.primary{width:100%;min-height:48px;margin-top:9px;border:0;border-radius:12px;background:var(--accent);box-shadow:0 5px 0 #214d4b;color:#fff;font-size:19px;font-weight:900;cursor:pointer}
.primary:active{transform:translateY(3px);box-shadow:0 2px 0 #214d4b}
.feedback{min-height:44px;margin-top:8px;padding:8px 10px;border:1px solid var(--line);border-radius:11px;background:#faf6ec;font-size:14px;line-height:1.45}
.feedback.ok{background:#eef8f2;border-color:#bde4cf;color:var(--ok);font-weight:900}
.feedback.try{background:#fff7e6;border-color:#efcf91;color:var(--warn);font-weight:800}
.explanation{margin-top:8px;padding:10px 11px;border-left:4px solid var(--ok);background:#eef8f2;color:#145c39;font-size:15px;line-height:1.6;font-weight:800}
.explanation p{margin:0}.explanation p+p{margin-top:3px}
.hidden{display:none}
.shake{animation:shake .24s linear}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.celebration{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1000}
.confetti{position:absolute;top:-60px;font-size:30px;animation:fall 2.7s linear forwards}
@keyframes fall{0%{transform:translateY(-80px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(420deg);opacity:0}}
.result{text-align:center;padding:22px 16px}
.big-celebrate{font-size:32px;font-weight:1000;line-height:1.35;color:var(--ok)}
.result-text{font-size:18px;font-weight:800;line-height:1.6}
@media(max-width:420px){
  h1{font-size:20px}
  .problem{font-size:32px}
  .card{padding:10px}
  .choice{min-height:46px;font-size:16px}
  .work-expression{font-size:25px}
  .feedback{min-height:42px}
}
</style>
</head>
<body>
<main class="app">
  <header>
    <div>
      <h1>D+案：かっこあり・なし 作戦練習</h1>
      <div class="sub">作戦を選んで、ここでおわりを確認</div>
    </div>
    <a class="toplink" href="index.html">一覧へ</a>
  </header>

  <div class="progress">
    <span class="pill" id="qPill">1問目 / 5問</span>
    <span class="pill" id="scorePill">正解 0</span>
    <span class="pill step" id="stepPill">作戦</span>
  </div>

  <section class="card problem-card">
    <small>計算しよう</small>
    <div class="problem" id="problemText"></div>
  </section>

  <section class="card" id="strategyCard">
    <div class="stage-label">作戦</div>
    <p class="prompt">これはどの作戦？</p>
    <div class="choice-grid">
      <button class="choice" type="button" onclick="checkStrategy('combine')">同類項をまとめる</button>
      <button class="choice" type="button" onclick="checkStrategy('distribution')">分配法則（かっこを外す）</button>
    </div>
    <div class="feedback" id="strategyFeedback" aria-live="polite">かっこがあるか、ないかを見ます。</div>
  </section>

  <section class="card hidden" id="distributionCard">
    <div class="stage-label">分配法則</div>
    <p class="prompt">外の数はどこにかける？</p>
    <div class="choice-grid">
      <button class="choice distribution-choice" type="button" onclick="checkDistribution('left')">左だけ</button>
      <button class="choice distribution-choice" type="button" onclick="checkDistribution('right')">右だけ</button>
      <button class="choice distribution-choice" type="button" onclick="checkDistribution('both')">両方</button>
    </div>
    <div class="feedback" id="distributionFeedback" aria-live="polite">かっこの中を1つずつ見ます。</div>
  </section>

  <section class="card hidden" id="answerCard">
    <div class="work-summary">
      <small>今の問題</small>
      <strong class="work-expression" id="answerProblem"></strong>
    </div>
    <p class="prompt">答えを入力しよう</p>
    <input id="answerInput" class="answer-input" autocomplete="off" autocapitalize="none" inputmode="none" readonly aria-label="答え" placeholder="答え">
    <div class="keypad">
      <button class="key" type="button" onclick="addToInput('1')">1</button>
      <button class="key" type="button" onclick="addToInput('2')">2</button>
      <button class="key" type="button" onclick="addToInput('3')">3</button>
      <button class="key" type="button" onclick="addToInput('a')">a</button>
      <button class="key" type="button" onclick="deleteInput()" title="1文字消す" aria-label="1文字消す">⌫</button>
      <button class="key" type="button" onclick="addToInput('4')">4</button>
      <button class="key" type="button" onclick="addToInput('5')">5</button>
      <button class="key" type="button" onclick="addToInput('6')">6</button>
      <button class="key" type="button" onclick="addToInput('+')">+</button>
      <button class="key" type="button" onclick="clearInput()" title="全部消す" aria-label="全部消す">C</button>
      <button class="key" type="button" onclick="addToInput('7')">7</button>
      <button class="key" type="button" onclick="addToInput('8')">8</button>
      <button class="key" type="button" onclick="addToInput('9')">9</button>
      <button class="key" type="button" onclick="addToInput('-')">−</button>
      <button class="key" type="button" onclick="addToInput('0')">0</button>
    </div>
    <button class="primary" type="button" onclick="checkAnswer()">答え合わせ</button>
    <div class="feedback" id="answerFeedback" aria-live="polite">画面のボタンで答えを入力します。</div>
  </section>

  <section class="card hidden" id="finishCard">
    <div class="work-summary">
      <small>できた式</small>
      <strong class="work-expression" id="finishedExpression"></strong>
    </div>
    <p class="prompt">まだまとめる？</p>
    <div class="choice-grid">
      <button class="choice finish-choice" type="button" onclick="checkFinish('combine')">まとめる</button>
      <button class="choice finish-choice" type="button" onclick="checkFinish('stop')">まとめない</button>
    </div>
    <div class="feedback" id="finishFeedback" aria-live="polite">2つの項が同類項かを見ます。</div>
    <div class="explanation hidden" id="explanation">
      <p>a がついている項と、a がついていない項は、同類項ではありません。</p>
      <p>1つにまとめないので、ここでおわり。</p>
    </div>
    <button class="primary hidden" id="nextButton" type="button" onclick="nextQuestion()">次の問題へ</button>
  </section>
</main>

<script>
function playCorrectSound(){try{const A=window.AudioContext||window.webkitAudioContext,ctx=new A(),notes=[698,1047];notes.forEach((freq,i)=>{const start=ctx.currentTime+i*.14,o=ctx.createOscillator(),g=ctx.createGain();o.type="triangle";o.frequency.setValueAtTime(freq,start);g.gain.setValueAtTime(.0001,start);g.gain.exponentialRampToValueAtTime(.16,start+.012);g.gain.exponentialRampToValueAtTime(.0001,start+.16);o.connect(g);g.connect(ctx.destination);o.start(start);o.stop(start+.17)})}catch(e){}}
function playCelebrationSound(){try{const A=window.AudioContext||window.webkitAudioContext,ctx=new A(),notes=[523,659,784,1046];notes.forEach((freq,i)=>{const o=ctx.createOscillator(),g=ctx.createGain(),start=ctx.currentTime+i*.12;o.type="sine";o.frequency.setValueAtTime(freq,start);g.gain.setValueAtTime(.0001,start);g.gain.exponentialRampToValueAtTime(.16,start+.02);g.gain.exponentialRampToValueAtTime(.0001,start+.18);o.connect(g);g.connect(ctx.destination);o.start(start);o.stop(start+.2)})}catch(e){}}
function showConfetti(){const layer=document.createElement("div");layer.className="celebration";const pieces=["🎉","✨","🌟","💮","👏","🎊"];for(let i=0;i<38;i++){const piece=document.createElement("span");piece.className="confetti";piece.textContent=pieces[Math.floor(Math.random()*pieces.length)];piece.style.left=Math.random()*100+"vw";piece.style.animationDelay=Math.random()*.7+"s";piece.style.fontSize=22+Math.random()*24+"px";layer.appendChild(piece)}document.body.appendChild(layer);setTimeout(()=>layer.remove(),3600)}

const QUESTIONS=[
  {problem:"-8(5 + 10a)",strategy:"distribution",answer:"-40 - 80a",hint:"-8を5と10aの両方にかけます。-8×5=-40、-8×10a=-80aです。"},
  {problem:"-3 - 3 + 9a",strategy:"combine",answer:"-6 + 9a",hint:"-3と-3は、aがついていない同類項です。9aとは1つにまとめません。"},
  {problem:"-3(-3 + 9a)",strategy:"distribution",answer:"9 - 27a",hint:"-3を-3と9aの両方にかけます。-3×(-3)=9、-3×9a=-27aです。"},
  {problem:"-4 - 8 - 7a",strategy:"combine",answer:"-12 - 7a",hint:"-4と-8は、aがついていない同類項です。-7aとは1つにまとめません。"},
  {problem:"-4(-8 - 7a)",strategy:"distribution",answer:"32 + 28a",hint:"-4を-8と-7aの両方にかけます。-4×(-8)=32、-4×(-7a)=28aです。"}
];

const STRATEGY_HINTS={combine:"かっこがないので、同類項を見つけます。",distribution:"かっこがあるので、外の数を中の両方にかけます。"};
let qIndex=0,score=0,answerLocked=false,transitionLocked=false,finishLocked=false;
let problemMistakes=QUESTIONS.map(()=>({strategy:false,distribution:false,answer:false,finish:false}));

function setVisible(id,visible){document.getElementById(id).classList.toggle("hidden",!visible)}
function setText(id,text){document.getElementById(id).textContent=text}
function setFeedback(id,text,type=""){const el=document.getElementById(id);el.className=`feedback${type?` ${type}`:""}`;el.textContent=text}
function markShake(id){const el=document.getElementById(id);el.classList.remove("shake");void el.offsetWidth;el.classList.add("shake")}
function setChoicesDisabled(selector,disabled){document.querySelectorAll(selector).forEach(button=>button.disabled=disabled)}

function render(){
  if(qIndex>=QUESTIONS.length){showResult();return}
  const q=QUESTIONS[qIndex];
  answerLocked=false;transitionLocked=false;finishLocked=false;
  setText("qPill",`${qIndex+1}問目 / ${QUESTIONS.length}問`);
  setText("scorePill",`正解 ${score}`);
  setText("stepPill","作戦");
  setText("problemText",q.problem);
  setText("answerProblem",q.problem);
  setText("finishedExpression",q.answer);
  setVisible("strategyCard",true);
  setVisible("distributionCard",false);
  setVisible("answerCard",false);
  setVisible("finishCard",false);
  setVisible("explanation",false);
  setVisible("nextButton",false);
  setChoicesDisabled("#strategyCard .choice",false);
  setChoicesDisabled(".distribution-choice",false);
  setChoicesDisabled(".finish-choice",false);
  setFeedback("strategyFeedback","かっこがあるか、ないかを見ます。");
  setFeedback("distributionFeedback","かっこの中を1つずつ見ます。");
  setFeedback("answerFeedback","画面のボタンで答えを入力します。");
  setFeedback("finishFeedback","2つの項が同類項かを見ます。");
  document.getElementById("answerInput").value="";
}

function checkStrategy(strategy){
  if(transitionLocked)return;
  const q=QUESTIONS[qIndex];
  if(strategy===q.strategy){
    transitionLocked=true;setChoicesDisabled("#strategyCard .choice",true);
    setFeedback("strategyFeedback","その作戦です。","ok");
    setTimeout(()=>q.strategy==="distribution"?showDistributionStep():showAnswerStep(),350);
  }else{
    problemMistakes[qIndex].strategy=true;
    setFeedback("strategyFeedback",STRATEGY_HINTS[q.strategy],"try");
    markShake("strategyCard");
  }
}

function showDistributionStep(){
  transitionLocked=false;
  setVisible("strategyCard",false);
  setVisible("distributionCard",true);
  setText("stepPill","両方にかける");
}

function checkDistribution(target){
  if(transitionLocked)return;
  if(target==="both"){
    transitionLocked=true;setChoicesDisabled(".distribution-choice",true);
    setFeedback("distributionFeedback","左と右の両方にかけます。","ok");
    setTimeout(showAnswerStep,350);
  }else{
    problemMistakes[qIndex].distribution=true;
    setFeedback("distributionFeedback","外の数を、かっこの中の左と右の両方にかけます。","try");
    markShake("distributionCard");
  }
}

function showAnswerStep(){
  transitionLocked=false;
  setVisible("strategyCard",false);
  setVisible("distributionCard",false);
  setVisible("answerCard",true);
  setText("stepPill","答え");
  document.getElementById("answerInput").value="";
  setFeedback("answerFeedback","画面のボタンで答えを入力します。");
}

function addToInput(value){if(!answerLocked)document.getElementById("answerInput").value+=value}
function deleteInput(){if(answerLocked)return;const input=document.getElementById("answerInput");input.value=input.value.slice(0,-1)}
function clearInput(){if(!answerLocked)document.getElementById("answerInput").value=""}
function normalizeAnswer(value){const fullWidth="０１２３４５６７８９";return value.trim().replace(/[０-９]/g,char=>String(fullWidth.indexOf(char))).replace(/[ａＡA]/g,"a").replace(/[＋]/g,"+").replace(/[−ー－]/g,"-").replace(/\s+/g,"")}

function checkAnswer(){
  if(answerLocked)return;
  const q=QUESTIONS[qIndex],input=document.getElementById("answerInput"),answer=normalizeAnswer(input.value);
  if(!answer){setFeedback("answerFeedback","まず答えを入力してください。","try");markShake("answerCard");return}
  if(answer===normalizeAnswer(q.answer)){
    answerLocked=true;score++;setText("scorePill",`正解 ${score}`);playCorrectSound();
    setFeedback("answerFeedback",`正解！ ${q.answer}`,"ok");
    setTimeout(showFinishStep,700);
  }else{
    problemMistakes[qIndex].answer=true;
    setFeedback("answerFeedback",q.hint,"try");
    markShake("answerCard");
  }
}

function showFinishStep(){
  const q=QUESTIONS[qIndex];
  setVisible("answerCard",false);
  setVisible("finishCard",true);
  setText("stepPill","ここでおわり？");
  setText("finishedExpression",q.answer);
}

function checkFinish(choice){
  if(finishLocked)return;
  if(choice==="stop"){
    finishLocked=true;setChoicesDisabled(".finish-choice",true);
    setFeedback("finishFeedback","そうです。まとめません。","ok");
    setVisible("explanation",true);
    const button=document.getElementById("nextButton");
    button.textContent=qIndex===QUESTIONS.length-1?"結果を見る":"次の問題へ";
    setVisible("nextButton",true);
  }else{
    problemMistakes[qIndex].finish=true;
    setFeedback("finishFeedback","aがついている項と、aがついていない項は、同類項ではありません。","try");
    markShake("finishCard");
  }
}

function nextQuestion(){qIndex++;render()}

function sendResult(){const correctCount=problemMistakes.filter((mistakes,index)=>!mistakes.strategy&&!mistakes.answer&&!mistakes.finish&&(QUESTIONS[index].strategy!=="distribution"||!mistakes.distribution)).length;const wrongProblems=[];problemMistakes.forEach((mistakes,index)=>{const problem=QUESTIONS[index].problem;if(mistakes.strategy)wrongProblems.push(`[作戦] ${problem}`);if(mistakes.distribution)wrongProblems.push(`[分配先] ${problem}`);if(mistakes.answer)wrongProblems.push(`[答え] ${problem}`);if(mistakes.finish)wrongProblems.push(`[終了判断] ${problem}`)});const data={studentId:"takumi",appId:"mojishiki-normal-basic-input",mode:"D_PLUS",totalQuestions:QUESTIONS.length,correctCount,allCorrect:correctCount===QUESTIONS.length,wrongProblems,device:navigator.userAgent,note:"D+案：かっこありなし・終了判断あり"};fetch("https://script.google.com/macros/s/AKfycbyB1kGi_sCQ5trrAA_o1c-6tn87LY0di6rqIkssJ6vIacZ2IN4Y65jj9vCWoIwaH9aV/exec",{method:"POST",mode:"no-cors",body:JSON.stringify(data)}).catch(error=>console.warn("結果を送信できませんでした。",error))}

function showResult(){
  showConfetti();playCelebrationSound();
  document.querySelector(".app").innerHTML=`<header><div><h1>結果</h1><div class="sub">かっこあり・なし 作戦練習</div></div><a class="toplink" href="index.html">一覧へ</a></header><section class="card result"><div class="big-celebrate">5問ぜんぶできました！</div><p class="result-text">同類項ではない項は、1つにまとめません。<br>ここでおわりを確認できました。</p><button class="primary" type="button" onclick="location.reload()">もう一度</button></section>`;
  sendResult();
}

render();
</script>
</body>
</html>
