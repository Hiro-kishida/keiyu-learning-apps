<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>B案：5問サクサク型</title><style>
:root{--bg:#f8f5ee;--card:#fff;--ink:#232323;--muted:#666;--line:#e7ded0;--accent:#2f6866;--soft:#e9f3f1;--ok:#197447;--bad:#aa3333;--warn:#8a5a00;--shadow:0 12px 28px rgba(0,0,0,.08)}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}.app{width:min(760px,100%);margin:0 auto;padding:16px 14px 32px}header{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}h1{font-size:clamp(22px,6vw,34px);margin:0;line-height:1.2}.sub{color:var(--muted);font-size:14px;line-height:1.6}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:18px;margin:14px 0}.problem{font-size:clamp(36px,11vw,66px);text-align:center;font-weight:900;letter-spacing:.02em;padding:20px 8px;border-radius:18px;background:#fffdf8;border:1px solid var(--line)}.problem small{display:block;font-size:15px;color:var(--muted);font-weight:700;margin-bottom:8px}.progress{display:flex;flex-wrap:wrap;gap:8px}.pill{display:inline-flex;align-items:center;min-height:34px;padding:6px 12px;border-radius:999px;background:var(--soft);color:var(--accent);font-weight:800;font-size:14px}.stage{font-size:18px;font-weight:900;color:var(--accent);margin-bottom:8px}.prompt{font-size:clamp(18px,5vw,25px);font-weight:850;line-height:1.45;margin:4px 0 12px}.answer-input{width:100%;min-height:64px;border:3px solid var(--accent);border-radius:18px;font-size:clamp(30px,9vw,48px);font-weight:900;text-align:center;padding:8px 12px;color:var(--ink);background:#fff}.answer-input:focus{outline:4px solid #cfe7e3}.keypad{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px}.key{border:0;border-radius:14px;min-height:50px;font-size:22px;font-weight:900;background:#fff;border:2px solid #dfd4c4;box-shadow:0 4px 0 #dfd4c4}.key:active{transform:translateY(3px);box-shadow:0 1px 0 #dfd4c4}.actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}@media(min-width:560px){.actions{grid-template-columns:1fr 1fr}}.primary,.ghost{width:100%;border-radius:16px;padding:15px 14px;min-height:58px;font-size:clamp(18px,5vw,24px);font-weight:900;cursor:pointer}.primary{background:var(--accent);color:white;border:0;box-shadow:0 6px 0 #214d4b}.ghost{background:white;color:var(--accent);border:2px solid var(--accent)}.feedback{min-height:58px;border-radius:16px;padding:12px 14px;margin-top:12px;font-size:17px;line-height:1.55;background:#faf6ec;border:1px solid var(--line)}.feedback.ok{background:#eef8f2;border-color:#bde4cf;color:var(--ok);font-weight:900}.feedback.try{background:#fff7e6;border-color:#efcf91;color:var(--warn);font-weight:800}.feedback.bad{background:#fff0f0;border-color:#eeb7b7;color:var(--bad);font-weight:800}.note{font-size:15px;color:var(--muted);line-height:1.7}.menu-grid,.result-list{display:grid;gap:12px}@media(min-width:680px){.menu-grid{grid-template-columns:repeat(3,1fr)}}.menu-card{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:var(--shadow)}.menu-card h2{margin:0 0 8px}.menu-card p{margin:0;color:var(--muted);line-height:1.6}.result-item{padding:12px;border-radius:14px;border:1px solid var(--line);background:#fff;line-height:1.65}.toplink{color:var(--accent);text-decoration:none;font-weight:900;white-space:nowrap}.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#eee7dc;padding:2px 6px;border-radius:7px}.shake{animation:shake .24s linear}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}.celebration{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1000}.confetti{position:absolute;top:-60px;font-size:30px;animation:fall 2.7s linear forwards}@keyframes fall{0%{transform:translateY(-80px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(420deg);opacity:0}}.big-celebrate{text-align:center;font-size:clamp(28px,8vw,48px);font-weight:1000;line-height:1.35;color:var(--ok)}
</style></head><body><main class="app"><header><div><h1>B案：5問サクサク型</h1><div class="sub">ランダム5問を入力する版</div></div><a class="toplink" href="index.html">一覧へ</a></header><section class="card"><div class="progress"><span class="pill" id="qPill">1問目</span><span class="pill" id="scorePill">正解 0</span><span class="pill" id="typePill">練習</span></div></section><section class="card"><div class="stage" id="stageText"></div><div class="problem"><small>計算しよう</small><span id="problemText"></span></div></section><section class="card" id="answerCard"><div class="prompt">答えを入力してください。</div><input id="answerInput" class="answer-input" autocomplete="off" autocapitalize="none" inputmode="none" readonly placeholder="ここに答え"><div class="keypad"><button class="key" onclick="addToInput('1')">1</button><button class="key" onclick="addToInput('2')">2</button><button class="key" onclick="addToInput('3')">3</button><button class="key" onclick="addToInput('x')">x</button><button class="key" onclick="deleteInput()">⌫</button><button class="key" onclick="addToInput('4')">4</button><button class="key" onclick="addToInput('5')">5</button><button class="key" onclick="addToInput('6')">6</button><button class="key" onclick="addToInput('+')">+</button><button class="key" onclick="clearInput()">C</button><button class="key" onclick="addToInput('7')">7</button><button class="key" onclick="addToInput('8')">8</button><button class="key" onclick="addToInput('9')">9</button><button class="key" onclick="addToInput('-')">−</button><button class="key" onclick="addToInput('0')">0</button></div><div class="actions"><button class="primary" onclick="checkAnswer()">答え合わせ</button><button class="ghost" onclick="showHint()">ヒント</button></div><div class="feedback" id="feedback">x は最後まで残します。空白は入れても大丈夫です。</div></section><button class="ghost" onclick="restart()">最初からやり直す</button></main><script>
function playCorrectSound(){try{const A=window.AudioContext||window.webkitAudioContext,ctx=new A(),o=ctx.createOscillator(),g=ctx.createGain();o.type="sine";o.frequency.setValueAtTime(660,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(990,ctx.currentTime+.12);g.gain.setValueAtTime(.0001,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.18,ctx.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.22);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+.24)}catch(e){}}
function playCelebrationSound(){try{const A=window.AudioContext||window.webkitAudioContext,ctx=new A(),notes=[523,659,784,1046];notes.forEach((freq,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type="sine";o.frequency.setValueAtTime(freq,ctx.currentTime+i*.12);g.gain.setValueAtTime(.0001,ctx.currentTime+i*.12);g.gain.exponentialRampToValueAtTime(.16,ctx.currentTime+i*.12+.02);g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+i*.12+.18);o.connect(g);g.connect(ctx.destination);o.start(ctx.currentTime+i*.12);o.stop(ctx.currentTime+i*.12+.2)})}catch(e){}}
function showConfetti(){const layer=document.createElement("div");layer.className="celebration";const pieces=["🎉","✨","🌟","💮","👏","🎊"];for(let i=0;i<38;i++){const s=document.createElement("span");s.className="confetti";s.textContent=pieces[Math.floor(Math.random()*pieces.length)];s.style.left=Math.random()*100+"vw";s.style.animationDelay=Math.random()*.7+"s";s.style.fontSize=22+Math.random()*24+"px";layer.appendChild(s)}document.body.appendChild(layer);setTimeout(()=>layer.remove(),3600)}
function shuffle(array){const a=[...array];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function sample(array,n){return shuffle(array).slice(0,n)}function setText(id,value){const el=document.getElementById(id);if(el)el.textContent=value}function markShake(){const el=document.getElementById("answerCard");if(!el)return;el.classList.remove("shake");void el.offsetWidth;el.classList.add("shake")}
function normalizeAnswer(s){if(!s)return"";const fw="０１２３４５６７８９";let out=s.trim();out=out.replace(/[０-９]/g,ch=>String(fw.indexOf(ch)));out=out.replace(/[ｘＸX]/g,"x");out=out.replace(/[＋]/g,"+").replace(/[−ー－]/g,"-");out=out.replace(/[×＊*]/g,"");out=out.replace(/\s+/g,"");return out}function isCorrect(input,q){const n=normalizeAnswer(input);const answers=[q.answer,...(q.aliases||[])].map(normalizeAnswer);return answers.includes(n)}
function addToInput(v){const input=document.getElementById("answerInput");input.value+=v}function deleteInput(){const input=document.getElementById("answerInput");input.value=input.value.slice(0,-1)}function clearInput(){const input=document.getElementById("answerInput");input.value=""}

const BANK=[{"stage": "① 同類項をまとめる", "type": "同類項", "problem": "7x + 5x", "answer": "12x", "aliases": ["12x"], "hint": "文字 x はそのまま。数字だけ 7 + 5 = 12。"}, {"stage": "① 同類項をまとめる", "type": "同類項", "problem": "-6x + 5x", "answer": "-x", "aliases": ["-x", "-1x"], "hint": "数字だけ見ると -6 + 5 = -1。だから -1x = -x。"}, {"stage": "① 同類項をまとめる", "type": "同類項", "problem": "8x - 3x", "answer": "5x", "aliases": ["5x"], "hint": "x はそのまま。数字だけ 8 - 3 = 5。"}, {"stage": "① 同類項をまとめる", "type": "同類項", "problem": "-2x - 4x", "answer": "-6x", "aliases": ["-6x"], "hint": "-2 - 4 = -6。だから -6x。"}, {"stage": "② 文字式に整数をかける", "type": "文字×整数", "problem": "3x × (-8)", "answer": "-24x", "aliases": ["-24x"], "hint": "3 × (-8) = -24。x はそのまま残します。"}, {"stage": "② 文字式に整数をかける", "type": "文字×整数", "problem": "(-2x) × 5", "answer": "-10x", "aliases": ["-10x"], "hint": "(-2) × 5 = -10。x はそのまま残します。"}, {"stage": "② 文字式に整数をかける", "type": "文字×整数", "problem": "x × (-8)", "answer": "-8x", "aliases": ["-8x"], "hint": "x は 1x と考えます。1x × (-8) = -8x。"}, {"stage": "② 文字式に整数をかける", "type": "文字×整数", "problem": "(-4x) × (-2)", "answer": "8x", "aliases": ["8x"], "hint": "マイナス×マイナスはプラス。4×2=8。"}, {"stage": "③ かっこを外す", "type": "かっこ外し", "problem": "3(4x + 5)", "answer": "12x + 15", "aliases": ["12x+15"], "hint": "3を 4x と +5 の両方にかけます。3×4x=12x、3×5=15。"}, {"stage": "③ かっこを外す", "type": "かっこ外し", "problem": "3(4x - 5)", "answer": "12x - 15", "aliases": ["12x-15"], "hint": "3を 4x と -5 の両方にかけます。3×4x=12x、3×(-5)=-15。"}, {"stage": "③ かっこを外す", "type": "かっこ外し", "problem": "2(3x + 4)", "answer": "6x + 8", "aliases": ["6x+8"], "hint": "2を 3x と +4 の両方にかけます。"}, {"stage": "③ かっこを外す", "type": "かっこ外し", "problem": "2(3x - 4)", "answer": "6x - 8", "aliases": ["6x-8"], "hint": "2を 3x と -4 の両方にかけます。"}, {"stage": "① 同類項をまとめる", "type": "同類項", "problem": "7x + 3 + 5x + 2", "answer": "12x + 5", "aliases": ["12x+5"], "hint": "x の項どうし、数字どうしでまとめます。7x+5x=12x、3+2=5。"}, {"stage": "③ かっこを外す", "type": "かっこ外し", "problem": "-3(4x - 5)", "answer": "-12x + 15", "aliases": ["-12x+15"], "hint": "-3を 4x と -5 の両方にかけます。-3×4x=-12x、-3×(-5)=+15。"}];const MODE="B";let quiz=[],qIndex=0,score=0,wrongItems=[],counts={"同類項":0,"文字×整数":0,"かっこ外し":0},locked=false;
function buildQuiz(){if(MODE==="A")return[...BANK.filter(q=>q.type==="同類項").slice(0,2),...BANK.filter(q=>q.type==="文字×整数").slice(0,3),...BANK.filter(q=>q.type==="かっこ外し").slice(0,3)];if(MODE==="C")return[...sample(BANK.filter(q=>q.type==="同類項"),2),...sample(BANK.filter(q=>q.type==="文字×整数"),2),...sample(BANK.filter(q=>q.type==="かっこ外し"),2)];return sample(BANK,5)}
function restart(){quiz=buildQuiz();qIndex=0;score=0;wrongItems=[];counts={"同類項":0,"文字×整数":0,"かっこ外し":0};locked=false;render()}
function render(){if(qIndex>=quiz.length)return showResult();const q=quiz[qIndex];setText("qPill",`${qIndex+1}問目 / ${quiz.length}問`);setText("scorePill",`正解 ${score}`);setText("typePill",q.type);setText("stageText",q.stage);setText("problemText",q.problem);const input=document.getElementById("answerInput");input.value="";input.disabled=false;locked=false;const fb=document.getElementById("feedback");fb.className="feedback";fb.textContent="答えを入力して「答え合わせ」を押します。"}
function checkAnswer(){if(locked)return;const q=quiz[qIndex],input=document.getElementById("answerInput"),value=input.value,fb=document.getElementById("feedback");if(!normalizeAnswer(value)){fb.className="feedback try";fb.textContent="まず答えを入力してください。";markShake();return}if(isCorrect(value,q)){locked=true;score++;playCorrectSound();fb.className="feedback ok";fb.textContent=`正解！ 答え：${q.answer}`;setText("scorePill",`正解 ${score}`);setTimeout(()=>{qIndex++;render()},900)}else{locked=true;counts[q.type]++;wrongItems.push({problem:q.problem,selected:value,answer:q.answer,type:q.type,hint:q.hint});fb.className="feedback bad";fb.textContent=`惜しいです。正解は「${q.answer}」。${q.hint}`;markShake();setTimeout(()=>{qIndex++;render()},1600)}}
function showHint(){const q=quiz[qIndex],fb=document.getElementById("feedback");fb.className="feedback try";fb.textContent=q.hint}document.addEventListener("keydown",e=>{if(e.key==="Enter")checkAnswer()});
function weakText(){const arr=Object.entries(counts).sort((a,b)=>b[1]-a[1]);if(arr[0][1]===0)return"つまずきなし";return`${arr[0][0]} 注意`}
function showResult(){const allCorrect=score===quiz.length;if(allCorrect){showConfetti();playCelebrationSound()}const mistakeList=wrongItems.length?wrongItems.map(w=>`<div class="result-item"><b>${w.problem}</b><br>入力：${w.selected}<br>正解：${w.answer}<br>タイプ：${w.type}<br>${w.hint}</div>`).join(""):`<div class="result-item">全問正解です。すばらしいです。</div>`;const summary=MODE==="C"?`<p class="note">今の見立て：<b>${weakText()}</b></p>`:"";document.querySelector(".app").innerHTML=`<header><div><h1>結果</h1><div class="sub">入力方式</div></div><a class="toplink" href="index.html">一覧へ</a></header><section class="card">${allCorrect?`<div class="big-celebrate">全問正解！<br>すごい！ぜんぶできました！</div>`:`<p class="prompt">${quiz.length}問中 ${score}問 正解</p>`}${summary}</section><section class="card"><div class="result-list">${mistakeList}</div><button class="primary" onclick="location.reload()">もう一度</button></section>`}
restart();</script></body></html>
