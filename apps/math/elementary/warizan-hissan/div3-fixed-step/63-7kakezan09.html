<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>63×7 筆算練習</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#fff;
  font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;
  display:flex;
  justify-content:center;
  padding:10px;
}
.app{
  width:min(520px,100%);
  min-height:820px;
  background:#fff;
}
.hissan{
  position:relative;
  width:320px;
  height:320px;
  margin:30px auto 0;
  font-family:"Trebuchet MS","Hiragino Sans",sans-serif;
}
.num{
  position:absolute;
  font-size:64px;
  line-height:1;
  color:#333;
}
#n6{left:120px;top:10px}
#n3{left:190px;top:10px}
#times{left:60px;top:92px;font-size:58px}
#n7{left:190px;top:92px}
#line{
  position:absolute;
  left:46px;
  top:172px;
  width:232px;
  border-top:5px solid #222;
}

/* 最初の小さい赤い？ */
#miniQ{
  position:absolute;
  left:160px;
  top:182px;
  color:#e60012;
  font-size:16px;
  font-weight:900;
}

/* 数字ボタン */
.keypad{
  width:390px;
  margin:10px auto 0;
  display:grid;
  grid-template-columns:repeat(5,62px);
  gap:12px;
  justify-content:center;
}
.key{
  width:58px;
  height:58px;
  border-radius:50%;
  border:3px solid #6aa1e8;
  background:radial-gradient(circle at 35% 25%,#cfe8ff,#4d8fe5 64%,#2f72c9);
  color:white;
  font-size:36px;
  font-weight:900;
  text-shadow:0 2px 2px #246;
  box-shadow:inset 0 3px 3px rgba(255,255,255,.75),0 4px 0 #2d65a8;
  cursor:pointer;
}
.key:active{
  transform:translateY(3px);
}

/* メッセージ */
.message{
  margin-top:24px;
  text-align:center;
  color:#e86c1c;
  font-size:20px;
  font-weight:900;
  line-height:1.6;
}

/* 下ボタン */
.bottom{
  width:420px;
  max-width:92%;
  margin:34px auto 0;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.btn{
  border:none;
  border-radius:24px;
  padding:18px 10px;
  color:#fff;
  font-size:22px;
  font-weight:900;
  cursor:pointer;
}
.hint{
  background:linear-gradient(#7ec9ff,#3d8fe4);
  box-shadow:0 5px 0 #2c67a7;
}
.reset{
  background:linear-gradient(#ff9ddd,#ef5baa);
  box-shadow:0 5px 0 #b55089;
}
.btn:active{
  transform:translateY(3px);
}
</style>
</head>
<body>
<main class="app">

<div class="hissan">
  <div id="n6" class="num">6</div>
  <div id="n3" class="num">3</div>
  <div id="times" class="num">×</div>
  <div id="n7" class="num">7</div>
  <div id="line"></div>

  <div id="miniQ">?</div>
</div>

<div class="keypad">
  <button class="key">1</button>
  <button class="key">2</button>
  <button class="key">3</button>
  <button class="key">4</button>
  <button class="key">5</button>

  <button class="key">6</button>
  <button class="key">7</button>
  <button class="key">8</button>
  <button class="key">9</button>
  <button class="key">0</button>
</div>

<div class="message">
21の十の位は2。小さくメモします。
</div>

<div class="bottom">
  <button class="btn hint">ヒント</button>
  <button class="btn reset">はじめから</button>
</div>

</main>
</body>
</html>
