  .sub{display:block;font-size:.58em;font-weight:700;opacity:.9;margin-top:2px;letter-spacing:0}

  .qmeta{display:flex;align-items:center;justify-content:space-between;gap:12px;color:#526064;font-weight:800}

  .ja{font-size:clamp(17px,3.7vw,27px);line-height:1.48;color:#333;margin:0}

  .choice:disabled{cursor:default}
  .choice.correct{background:#e5f8ed;border-bottom-color:var(--ok);color:#0f7d43}
  .choice.wrong{background:#fde9e5;border-bottom-color:var(--bad);color:#b62929}
  .choice.dim{opacity:.42}
  .feedback{min-height:46px;font-size:clamp(19px,4.5vw,26px);font-weight:850;text-align:center;display:flex;align-items:center;justify-content:center;padding:2px 4px}
  .feedback.ok{color:var(--ok)}
  .feedback.bad{color:var(--bad)}
  .bottom{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;padding:0 24px 24px}
  .btn{border:0;border-radius:999px;background:var(--teal);color:white;font-weight:850;font-size:18px;padding:13px 22px;cursor:pointer}
  .btn.secondary{background:#738184}
  .btn:disabled{opacity:.45;cursor:default}
  .result-actions{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;margin:14px auto 6px}

  .start p{font-size:clamp(17px,4vw,22px);line-height:1.65;margin:8px auto 20px;max-width:620px;color:#3c474a}
  .mode-buttons{display:grid;gap:16px;margin:22px auto 8px;max-width:560px}
  .mode-btn{border:0;border-radius:18px;background:var(--teal);color:white;font-weight:900;font-size:clamp(21px,5vw,31px);line-height:1.35;padding:20px 18px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.12);text-align:left}

  .mode-btn.review-mode{background:#f0a51d;color:#fff}
  .mode-btn:disabled{background:#b9c4c7;color:#eef5f6;cursor:default;box-shadow:none}
  .mode-btn.range-mode{background:#16a05f;color:#fff}
  .range-panel{background:#eefbf3;border:1px solid #c8efd8;border-radius:18px;padding:16px 14px;display:grid;gap:12px;text-align:left}

  .mini{font-size:14px;color:#666;width:100%;text-align:center;margin-top:2px}
  .result{display:none;text-align:center;padding:30px 24px 18px}
  .result h2{font-size:clamp(31px,6vw,46px);margin:8px 0 8px;color:var(--teal-dark)}
  .result p{font-size:clamp(18px,4vw,23px);line-height:1.65;margin:6px auto 16px;max-width:720px}
  .meter{width:min(560px,100%);height:18px;background:#eee;border-radius:999px;margin:18px auto;overflow:hidden}
  .meter > div{height:100%;background:var(--teal);width:0%;transition:width .5s}
  .review{margin-top:18px;text-align:left;display:grid;gap:12px}
  .review-card{background:#fffdf6;border:1px solid #e4dac2;border-radius:14px;padding:14px 15px;line-height:1.55}

    .bottom{padding-bottom:18px}

}

function loadReviewIds() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed.map(String) : [];
  } catch (e) {
    return [];
  }
}

function saveReviewIds(ids) {
  try {
    const unique = [...new Set(ids.map(String))];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(unique));
  } catch (e) {}
}

function addToReview(q) {
  const ids = loadReviewIds();
  const id = getQuestionId(q);
  if (!ids.includes(id)) ids.push(id);
  saveReviewIds(ids);
}

function removeFromReview(q) {
  const id = getQuestionId(q);
  saveReviewIds(loadReviewIds().filter(savedId => savedId !== id));
}

function clearReviewList() {
  saveReviewIds([]);
  updateMiniInfo();
  showEmptyReviewMessage();
}

function getReviewQuestions() {
  const ids = loadReviewIds();
  return questions.filter(q => ids.includes(getQuestionId(q)));
}

function updateMiniInfo() {
  const count = getReviewQuestions().length;
  $('miniInfo').textContent = `答えを選ぶと、自動で次の問題へ進みます。復習リスト：${count}問`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}


function showStart() {
  clearTimeout(autoTimer);
  locked = false;
  $('start').style.display = 'block';
  $('quiz').style.display = 'none';
  $('result').style.display = 'none';
  $('counter').textContent = '選択';
  $('rangeError').textContent = '';
  $('rangeStart').max = String(questions.length);
  $('rangeEnd').max = String(questions.length);
  $('startAllSub').textContent = `${questions.length}問すべてに挑戦`;
  const reviewCount = getReviewQuestions().length;
  const btn = $('startReviewModeBtn');
  btn.disabled = reviewCount === 0;
  $('startReviewSub').textContent = reviewCount > 0
    ? `前回の間違い ${reviewCount}問を復習`
    : '前回間違えた問題はありません';
  updateMiniInfo();
}

function startNormal() {
  startQuiz([...questions], 'normal');
}

function startReview() {
  const reviewQuestions = getReviewQuestions();
  if (reviewQuestions.length === 0) {
    showEmptyReviewMessage();
    return;
  }
  startQuiz(reviewQuestions, 'review');
}

function startRange() {
  const startNo = Number($('rangeStart').value);
  const endNo = Number($('rangeEnd').value);
  $('rangeError').textContent = '';

  if (!Number.isInteger(startNo) || !Number.isInteger(endNo)) {
    $('rangeError').textContent = `1〜${questions.length}の数字で入力してください。`;
    return;
  }
  if (startNo < 1 || endNo < 1 || startNo > questions.length || endNo > questions.length) {
    $('rangeError').textContent = `1〜${questions.length}の数字で入力してください。`;
    return;
  }
  if (startNo > endNo) {
    $('rangeError').textContent = '始めの番号は、終わりの番号より小さくしてください。';
    return;
  }

  const rangeQuestions = questions.filter(q => q.no >= startNo && q.no <= endNo);
  currentRangeLabel = `${startNo}〜${endNo}番`;
  startQuiz(rangeQuestions, 'range');
}

function startQuiz(questionSet, nextMode) {
  clearTimeout(autoTimer);
  mode = nextMode;
  if (nextMode !== 'range') currentRangeLabel = '';
  activeQuestions = questionSet;
  index = 0;
  correctCount = 0;
  answers = Array(activeQuestions.length).fill(null);
  render();
}

function render() {
  clearTimeout(autoTimer);
  locked = false;
  const q = activeQuestions[index];
  $('start').style.display = 'none';
  $('quiz').style.display = 'flex';
  $('result').style.display = 'none';
  $('counter').textContent = `${index + 1}/${activeQuestions.length}`;
  if (mode === 'review') {
    $('qNo').textContent = `復習 No.${q.no}`;
  } else if (mode === 'range') {
    $('qNo').textContent = `範囲 No.${q.no}`;
  } else {
    $('qNo').textContent = `No.${q.no}`;
  }
  $('liveScore').textContent = `正解 ${correctCount}`;
  $('en').textContent = q.en;
  $('ja').textContent = q.ja;
  $('feedback').textContent = '';
  $('feedback').className = 'feedback';
  $('choices').innerHTML = '';
  updateMiniInfo();

  shuffle(q.choices).forEach(choice => {
    const button = document.createElement('button');
    button.className = 'choice';
    button.type = 'button';
    button.textContent = choice;
    button.addEventListener('click', () => select(choice));
    $('choices').appendChild(button);
  });
}

function select(choice) {
  if (locked) return;
  locked = true;
  answers[index] = choice;
  const q = activeQuestions[index];
  const ok = choice === q.answer;

  if (ok) {
    correctCount += 1;
    if (mode === 'review') removeFromReview(q);
  } else {
    addToReview(q);
  }

  document.querySelectorAll('.choice').forEach(button => {
    button.disabled = true;
    if (button.textContent === q.answer) button.classList.add('correct');
    else if (button.textContent === choice) button.classList.add('wrong');
    else button.classList.add('dim');
  });

  $('feedback').textContent = ok ? '正解！' : `惜しい！ 正解は「${q.answer}」`;
  $('feedback').className = 'feedback ' + (ok ? 'ok' : 'bad');
  $('liveScore').textContent = `正解 ${correctCount}`;
  updateMiniInfo();

  if (ok) beep(880, 90);
  const wait = ok ? 850 : 1850;
  autoTimer = setTimeout(() => {
    if (index < activeQuestions.length - 1) {
      index += 1;
      render();
    } else {
      showResult();
    }
  }, wait);
}

function beep(freq, duration) {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration / 1000);
    osc.start();
    osc.stop(ctx.currentTime + duration / 1000);
  } catch (e) {}
}

function showResult() {
  clearTimeout(autoTimer);
  $('start').style.display = 'none';
  $('quiz').style.display = 'none';
  $('result').style.display = 'block';

  const total = activeQuestions.length;
  const rate = total === 0 ? 0 : Math.round(correctCount / total * 100);
  const remainingReviewCount = getReviewQuestions().length;

  $('counter').textContent = `${correctCount}/${total}`;
  $('meterBar').style.width = rate + '%';

  if (mode === 'review') {
    $('resultTitle').textContent = remainingReviewCount === 0 ? '復習完了！' : '復習結果';
    $('resultText').textContent = `${total}問中 ${correctCount}問正解です。復習リストに残っている問題は ${remainingReviewCount}問です。`;
  } else if (mode === 'range') {
    $('resultTitle').textContent = correctCount === total ? '範囲内 全問正解！' : '範囲指定の結果';
    $('resultText').textContent = `${currentRangeLabel}の ${total}問中 ${correctCount}問正解です。正答率 ${rate}％。復習リストに残っている問題は ${remainingReviewCount}問です。`;
  } else {
    $('resultTitle').textContent = correctCount === total ? '全問正解！' : '結果';
    $('resultText').textContent = `${total}問中 ${correctCount}問正解です。正答率 ${rate}％。復習リストに残っている問題は ${remainingReviewCount}問です。`;
  }

  const wrong = activeQuestions.map((q, i) => ({q, i})).filter(x => answers[x.i] !== x.q.answer);
  if (wrong.length === 0) {
    const message = mode === 'review'
      ? '今回の復習問題は全部できました。復習リストから消えました。'
      : '全部できました。すばらしいです。';
    $('review').innerHTML = `<div class="review-card"><b>すばらしいです。</b><br>${message}</div>`;
  } else {
    $('review').innerHTML = wrong.map(({q, i}) => `
      <div class="review-card">
        <b>No.${q.no}　${escapeHtml(q.answer)}</b><br>
        ${escapeHtml(q.en)}<br>
        ${escapeHtml(q.ja)}
        <div class="small">あなたの答え：${escapeHtml(answers[i] || '未回答')}</div>
      </div>`).join('');
  }

  updateResultButtons();
  updateMiniInfo();
}

function showEmptyReviewMessage() {
  clearTimeout(autoTimer);
  $('start').style.display = 'none';
  $('quiz').style.display = 'none';
  $('result').style.display = 'block';
  $('counter').textContent = '0/0';
  $('meterBar').style.width = '100%';
  $('resultTitle').textContent = '復習する問題はありません';
  $('resultText').textContent = '今この端末に残っている復習問題はありません。すばらしいです！';
  $('review').innerHTML = '<div class="review-card"><b>復習リストは空です。</b><br>通常モードで間違えた問題があると、ここに自動で残ります。</div>';
  updateResultButtons();
  updateMiniInfo();
}

function updateResultButtons() {
  const reviewCount = getReviewQuestions().length;
  $('reviewBtn').style.display = reviewCount > 0 ? 'inline-block' : 'none';
  $('clearReviewBtn').style.display = reviewCount > 0 ? 'inline-block' : 'none';
  $('reviewBtn').textContent = reviewCount > 0 ? `間違えた問題だけ復習する（${reviewCount}問）` : '間違えた問題だけ復習する';
}

function escapeHtml(str) {
  return String(str).replace(/[&<>'"]/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;'
  }[ch]));
}

$('startAllBtn').addEventListener('click', startNormal);
$('startReviewModeBtn').addEventListener('click', startReview);
$('startRangeModeBtn').addEventListener('click', startRange);
$('reviewBtn').addEventListener('click', startReview);
$('restartBtn').addEventListener('click', startNormal);
$('menuBtn').addEventListener('click', showStart);
$('rangeStart').addEventListener('keydown', event => { if (event.key === 'Enter') startRange(); });
$('rangeEnd').addEventListener('keydown', event => { if (event.key === 'Enter') startRange(); });

$('clearReviewBtn').addEventListener('click', () => {
  const reviewCount = getReviewQuestions().length;
  if (reviewCount === 0) return;
  if (confirm(`復習リスト ${reviewCount}問をリセットしますか？`)) {
    clearReviewList();
  }
});

showStart();
</script>
</body>
</html>
